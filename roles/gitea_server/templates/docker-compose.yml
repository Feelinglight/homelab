version: "3"

services:
  gitea:
    image: gitea/gitea:1.17.3
    container_name: gitea
    environment:
        - USER_UID={{ git_user_uid }}
        - USER_GID={{ git_user_uid }}
    restart: unless-stopped
    volumes:
      - {{ gitea_data_dir }}:/data
      - /home/git/.ssh:/data/git/.ssh
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2222:22"
      - "3000:3000"
