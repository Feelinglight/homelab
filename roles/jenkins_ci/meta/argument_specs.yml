argument_specs:
  main:
    short_description: Настраивает сервис Jenkins
    options:
      jenkins_domain:
        type: "str"
        default: jenkins.local
        description: "Доменное имя, на котором будет располагаться Jenkins"

      server_data_dir:
        type: "str"
        required: true
        description: "Папка, в которой будет создана папка jenkins, где Jenkins будет хранить данные"